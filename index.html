<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <title>مخطط السفر بالذكاء الاصطناعي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --color-primary: #2563EB;
            --color-secondary: #F97316;
            --color-bg: #F8FAFC;
            --color-surface: #FFFFFF;
            --color-text-primary: #1E293B;
            --color-text-secondary: #64748B;
            --color-success: #22C55E;
            --color-danger: #EF4444;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            font-family: 'Tajawal', system-ui, sans-serif;
            background: var(--color-bg);
            color: var(--color-text-primary);
        }
        h1, h2, h3, h4, button {
            font-family: 'Cairo', system-ui, sans-serif;
        }
        a { text-decoration: none; color: inherit; }
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--color-surface);
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.08);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        .logo i { font-size: 1.4rem; }
        .header-actions button {
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            border: none;
            background: var(--color-primary);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .header-actions button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
            background: #1d4ed8;
        }
        .page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
            gap: 2rem;
            align-items: center;
            padding: 2rem 0 1rem;
        }
        .hero-text h1 {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
        }
        .hero-text p {
            color: var(--color-text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }
        .hero-cta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-primary {
            padding: 0.8rem 1.6rem;
            border-radius: 999px;
            border: none;
            background: var(--color-secondary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 24px rgba(249, 115, 22, 0.35);
            background: #ea580c;
        }
        .hero-highlight {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            background: var(--color-surface);
            border-radius: 1rem;
            padding: 1.25rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .section {
            margin-top: 2.5rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .section-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-title i {
            color: var(--color-primary);
        }
        .card {
            background: var(--color-surface);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            font-size: 0.9rem;
        }
        select, input[type="number"], input[type="text"] {
            padding: 0.55rem 0.7rem;
            border-radius: 0.6rem;
            border: 1px solid #CBD5F5;
            font-family: inherit;
            font-size: 0.9rem;
            background: #F9FAFB;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .radio-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            border: 1px solid #CBD5F5;
            cursor: pointer;
            font-size: 0.85rem;
            background: #F9FAFB;
        }
        .form-actions {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn-generate {
            padding: 0.7rem 1.6rem;
            border-radius: 999px;
            border: none;
            background: var(--color-primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .loading-state {
            display: none;
            align-items: center;
            gap: 0.6rem;
            color: var(--color-text-secondary);
            font-size: 0.9rem;
        }
        #map {
            width: 100%;
            height: 500px;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .tab {
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: 1px solid #CBD5F5;
            background: #F9FAFB;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .itinerary-day {
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr);
            gap: 1.5rem;
        }
        .activities-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .activity-card {
            display: flex;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 0.9rem;
            background: #F9FAFB;
            border: 1px solid #E2E8F0;
            cursor: pointer;
        }
        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 999px;
            background: rgba(249, 115, 22, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-secondary);
            flex-shrink: 0;
        }
        .timeline {
            position: relative;
            padding-right: 1.5rem;
        }
        .timeline-line {
            position: absolute;
            top: 0.5rem;
            bottom: 0.5rem;
            right: 0.4rem;
            width: 2px;
            background: #CBD5F5;
        }
        .timeline-item {
            position: relative;
            padding-right: 1.5rem;
            margin-bottom: 1rem;
        }
        .budget-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
            gap: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 0.6rem 0.4rem;
            text-align: right;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            border-radius: 999px;
            background: #E5E7EB;
            overflow: hidden;
        }
        .currency-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 999px;
            border: 1px solid #CBD5F5;
            background: #F9FAFB;
            cursor: pointer;
        }
        .budget-chart {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.75rem;
        }
        .chart-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
        }
        .bookings-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
        }
        .booking-card {
            background: #F9FAFB;
            border-radius: 0.9rem;
            overflow: hidden;
            border: 1px solid #E2E8F0;
            display: flex;
            flex-direction: column;
        }
        .booking-image {
            height: 120px;
            background-size: cover;
            background-position: center;
        }
        .booking-content {
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            flex: 1;
        }
        .booking-actions {
            padding: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-book {
            padding: 0.45rem 0.9rem;
            border-radius: 999px;
            border: none;
            background: var(--color-secondary);
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .export-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .btn-outline {
            padding: 0.7rem 1.4rem;
            border-radius: 999px;
            border: 1px solid #CBD5F5;
            background: #F9FAFB;
            font-size: 0.9rem;
            cursor: pointer;
        }
        footer {
            margin-top: 3rem;
            padding: 1.5rem;
            background: #0F172A;
            color: #E5E7EB;
        }
        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            font-size: 0.85rem;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal {
            background: var(--color-surface);
            border-radius: 1rem;
            max-width: 480px;
            width: 90%;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25);
            position: relative;
        }
        .toast-container {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 3000;
        }
        </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                <i class="fa-solid fa-plane-departure"></i>
                <span>مخطط السفر بالذكاء الاصطناعي</span>
            </div>
            <div class="header-actions">
                <button id="startTripBtn">
                    ابدأ رحلتك
                    <i class="fa-solid fa-arrow-down-long"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="page" id="app">
        <section class="hero fade-section">
            <div class="hero-text">
                <h1>خطط رحلتك المثالية في دقائق</h1>
                <p>وكيل السفر الرقمي الخاص بك...</p>
                </section>

        <!-- بقية الأقسام كما هي دون أي تعديل -->
        <!-- النموذج، الخريطة، الجدول الزمني، الميزانية، الحجوزات، التصدير -->

    </main>

    <footer>
        <div class="footer-inner">
            <div>
                <strong>مخطط السفر بالذكاء الاصطناعي</strong><br />
                <span style="font-size:0.8rem;">منصة تجريبية...</span>
            </div>
            <div class="footer-links">
                <a href="#">حول المشروع</a>
                <a href="#">الأسئلة الشائعة</a>
                <a href="#">الشروط والأحكام</a>
                <a href="#">سياسة الخصوصية</a>
            </div>
            <div style="font-size:0.8rem;">
                © <span id="yearSpan"></span> جميع الحقوق محفوظة.
                </div>
        </div>
    </footer>
    <!-- Modal نافذة النشاط -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle"></div>
                <button class="modal-close" id="modalCloseBtn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <div id="modalDescription"></div>
                <div id="modalMeta"></div>
                <img id="modalImage" src="" alt="صورة النشاط" style="display:none;" />
            </div>
        </div>
    </div>
    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>
    <script>
        // بيانات الوجهات الوهمية
        const destinationsData = {
            dubai: {
                name: 'دبي',
                center: [25.2048, 55.2708],
                places: [
                    { name: 'برج خليفة', coords: [25.1972, 55.2744] },
                    { name: 'دبي مول', coords: [25.1972, 55.2792] },
                    { name: 'المدينة القديمة', coords: [25.2631, 55.2972] },
                    { name: 'نخلة جميرا', coords: [25.1181, 55.1386] },
                    { name: 'صحراء دبي', coords: [25.1334, 55.2962] }
                ]
            },
            abudhabi: {
                name: 'أبوظبي',
                center: [24.4539, 54.3773],
                places: [
                    { name: 'مسجد الشيخ زايد', coords: [24.4128, 54.4749] },
                    { name: 'لوفر أبوظبي', coords: [24.5333, 54.3983] },
                    { name: 'جزيرة ياس', coords: [24.4985, 54.6036] },
                    { name: 'كورنيش أبوظبي', coords: [24.4818, 54.3716] },
                    { name: 'عالم فيراري', coords: [24.4841, 54.6070] }
                ]
            },
            rak: {
                name: 'رأس الخيمة',
                center: [25.8007, 55.9762],
                places: [
                    { name: 'جبل جيس', coords: [25.9361, 56.1884] },
                    { name: 'شاطئ الحمرة', coords: [25.7186, 55.8783] },
                    { name: 'قلعة ضاية', coords: [25.6744, 56.0322] },
                    { name: 'الوادي الكبير', coords: [25.8000, 56.1000] },
                    { name: 'سوق الكور', coords: [25.7895, 55.9432] }
                ]
            }
        };
        // ألوان الأيام للعلامات على الخريطة
        const dayColors = ['#EF4444', '#3B82F6', '#22C55E', '#F97316', '#6366F1', '#FACC15', '#14B8A6', '#EC4899'];

        // حالة التطبيق
        let appState = {
            destinationKey: null,
            days: 4,
            budgetUSD: 1500,
            currency: 'USD',
            tripType: null,
            itinerary: [],
            map: null,
            markersLayer: null
        };
        function initApp() {
            document.getElementById('yearSpan').textContent = new Date().getFullYear();

            const startTripBtn = document.getElementById('startTripBtn');
            const heroCtaBtn = document.getElementById('heroCtaBtn');
            const plannerSection = document.getElementById('plannerSection');

            startTripBtn.addEventListener('click', () => {
                plannerSection.scrollIntoView({ behavior: 'smooth' });
            });

            heroCtaBtn.addEventListener('click', () => {
                plannerSection.scrollIntoView({ behavior: 'smooth' });
            });

            const tripTypeGroup = document.getElementById('tripTypeGroup');
            tripTypeGroup.addEventListener('change', (e) => {
                if (e.target.name === 'tripType') {
                    appState.tripType = e.target.value;
                    updateRadioPills();
                    generatePlan(true);
                }
            });

            tripTypeGroup.querySelectorAll('.radio-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    const input = pill.querySelector('input');
                    input.checked = true;
                    appState.tripType = input.value;
                    updateRadioPills();
                    generatePlan(true);
                });
            });

            document.getElementById('destination').addEventListener('change', () => {
                generatePlan(true);
            });
            document.getElementById('days').addEventListener('input', () => {
                generatePlan(true);
            });
            document.getElementById('budget').addEventListener('input', () => {
                generatePlan(true);
            });

            document.getElementById('generateBtn').addEventListener('click', () => {
                generatePlan(false);
            });

            document.getElementById('currencyToggleBtn').addEventListener('click', () => {
                toggleCurrency();
            });

            document.getElementById('exportPdfBtn').addEventListener('click', () => {
                exportToPDF();
            });

            document.getElementById('printBtn').addEventListener('click', () => {
                window.print();
            });

            document.getElementById('modalCloseBtn').addEventListener('click', () => {
                closeModal();
            });
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target.id === 'modalOverlay') {
                    closeModal();
                }
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.fade-section').forEach(section => {
                observer.observe(section);
            });

            renderMap();

            document.querySelector('input[name="tripType"][value="family"]').checked = true;
            appState.tripType = 'family';
            updateRadioPills();
            document.getElementById('destination').value = 'dubai';
            generatePlan(true);
        }
        // دالة updateRadioPills: تحديث مظهر أزرار نوع الرحلة
        function updateRadioPills() {
            const pills = document.querySelectorAll('#tripTypeGroup .radio-pill');
            pills.forEach(pill => {
                const input = pill.querySelector('input');
                if (input.checked) {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });
        }
        // دالة generatePlan: توليد الخطة اليومية بناءً على المدخلات
        function generatePlan(isAuto) {
            const destinationSelect = document.getElementById('destination');
            const daysInput = document.getElementById('days');
            const budgetInput = document.getElementById('budget');
            const errorEl = document.getElementById('formError');
            const loadingState = document.getElementById('loadingState');

            const destinationKey = destinationSelect.value;
            const days = parseInt(daysInput.value, 10);
            const budget = parseFloat(budgetInput.value);

            if (!destinationKey || isNaN(days) || days < 1 || days > 14 || isNaN(budget) || budget <= 0 || !appState.tripType) {
                if (!isAuto) {
                    errorEl.textContent = 'يرجى ملء جميع الحقول بشكل صحيح قبل توليد الخطة.';
                }
                return;
            } else {
                errorEl.textContent = '';
            }

            appState.destinationKey = destinationKey;
            appState.days = days;
            appState.budgetUSD = budget;

            loadingState.style.display = 'flex';

            setTimeout(() => {
                const dest = destinationsData[destinationKey];
                const places = dest.places;
                const activitiesPerDay = [];
                const times = ['صباحاً', 'ظهراً', 'عصراً', 'مساءً'];

                for (let day = 0; day < days; day++) {
                    const dayActivities = [];
                    for (let i = 0; i < 4; i++) {
                        const placeIndex = (day * 3 + i) % places.length;
                        const place = places[placeIndex];
                        dayActivities.push({
                            title: place.name,
                            timeLabel: times[i],
                            description: `نشاط ${times[i]} في ${place.name} ضمن رحلة ${dest.name} (${getTripTypeLabel(appState.tripType)}).`,
                            duration: i === 3 ? '2 ساعة' : '3 ساعات',
                            costUSD: 50 + i * 20,
                            coords: place.coords,
                            icon: i % 2 === 0 ? 'fa-solid fa-landmark' : 'fa-solid fa-umbrella-beach'
                        });
                    }
                    activitiesPerDay.push(dayActivities);
                }

                appState.itinerary = activitiesPerDay;

                renderMap();
                renderItinerary();
                renderBudget();
                renderBookings();

                loadingState.style.display = 'none';

                if (!isAuto) {
                    showToast('تم توليد خطتك بنجاح! 🎉', 'success');
                }
            }, isAuto ? 0 : 2000);
        }
        function getTripTypeLabel(type) {
            switch (type) {
                case 'family': return 'عائلية';
                case 'business': return 'عمل';
                case 'adventure': return 'مغامرة';
                case 'relax': return 'استرخاء';
                default: return '';
            }
        }
        function renderMap() {
            const mapContainer = document.getElementById('map');

            if (!appState.map) {
                appState.map = L.map(mapContainer).setView([25.2048, 55.2708], 10);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: ''
                }).addTo(appState.map);
            }

            if (appState.markersLayer) {
                appState.map.removeLayer(appState.markersLayer);
            }

            appState.markersLayer = L.layerGroup().addTo(appState.map);

            if (!appState.destinationKey || !appState.itinerary.length) {
                appState.map.setView([25.2048, 55.2708], 10);
                return;
            }

            const dest = destinationsData[appState.destinationKey];
            appState.map.setView(dest.center, 11);

            const allCoords = [];
            appState.itinerary.forEach((dayActivities, dayIndex) => {
                const color = dayColors[dayIndex % dayColors.length];
                dayActivities.forEach((activity) => {
                    const marker = L.circleMarker(activity.coords, {
                        radius: 8,
                        color: color,
                        fillColor: color,
                        fillOpacity: 0.9
                    }).addTo(appState.markersLayer);

                    marker.bindPopup(`<strong>اليوم ${dayIndex + 1} - ${activity.timeLabel}</strong><br>${activity.title}`);

                    allCoords.push(activity.coords);
                });
            });

            if (allCoords.length > 1) {
                const polyline = L.polyline(allCoords, {
                    color: '#0F172A',
                    weight: 3,
                    opacity: 0.7
                }).addTo(appState.markersLayer);
                appState.map.fitBounds(polyline.getBounds(), { padding: [20, 20] });
            }
        }
        function renderItinerary() {
            const dayTabs = document.getElementById('dayTabs');
            const daySelect = document.getElementById('daySelect');
            const container = document.getElementById('itineraryContainer');

            dayTabs.innerHTML = '';
            daySelect.innerHTML = '';
            container.innerHTML = '';

            if (!appState.itinerary.length) {
                container.innerHTML = '<p style="font-size:0.9rem;color:var(--color-text-secondary);">لم يتم توليد جدول بعد.</p>';
                return;
            }

            appState.itinerary.forEach((dayActivities, index) => {
                const tab = document.createElement('button');
                tab.className = 'tab' + (index === 0 ? ' active' : '');
                tab.textContent = `اليوم ${index + 1}`;
                tab.dataset.dayIndex = index;
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderDayItinerary(index);
                    daySelect.value = index;
                });
                dayTabs.appendChild(tab);

                const option = document.createElement('option');
                option.value = index;
                option.textContent = `اليوم ${index + 1}`;
                daySelect.appendChild(option);
            });

            daySelect.addEventListener('change', () => {
                const idx = parseInt(daySelect.value, 10);
                renderDayItinerary(idx);
                document.querySelectorAll('.tab').forEach(t => {
                    t.classList.toggle('active', parseInt(t.dataset.dayIndex, 10) === idx);
                });
            });

            daySelect.value = 0;
            renderDayItinerary(0);
        }

        function renderDayItinerary(dayIndex) {
            const container = document.getElementById('itineraryContainer');
            const dayActivities = appState.itinerary[dayIndex];

            container.innerHTML = '';

            const wrapper = document.createElement('div');
            wrapper.className = 'itinerary-day';

            const activitiesList = document.createElement('div');
            activitiesList.className = 'activities-list';

            dayActivities.forEach((activity) => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                card.addEventListener('click', () => {
                    showModal(activity);
                });

                const icon = document.createElement('div');
                icon.className = 'activity-icon';
                icon.innerHTML = `<i class="${activity.icon}"></i>`;

                const content = document.createElement('div');
                content.className = 'activity-content';

                const header = document.createElement('div');
                header.className = 'activity-header';

                const title = document.createElement('div');
                title.textContent = activity.title;

                const time = document.createElement('div');
                time.className = 'activity-time';
                time.textContent = activity.timeLabel;

                header.appendChild(title);
                header.appendChild(time);

                const desc = document.createElement('div');
                desc.className = 'activity-description';
                desc.textContent = activity.description;

                content.appendChild(header);
                content.appendChild(desc);

                card.appendChild(icon);
                card.appendChild(content);

                activitiesList.appendChild(card);
            });

            const timeline = document.createElement('div');
            timeline.className = 'timeline';

            const line = document.createElement('div');
            line.className = 'timeline-line';
            timeline.appendChild(line);

            dayActivities.forEach((activity) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';

                const dot = document.createElement('div');
                dot.className = 'timeline-dot';
                timeline.appendChild(dot);

                const title = document.createElement('div');
                title.className = 'timeline-item-title';
                title.textContent = activity.title;

                const time = document.createElement('div');
                time.className = 'timeline-item-time';
                time.textContent = `${activity.timeLabel} • مدة: ${activity.duration}`;

                item.appendChild(title);
                item.appendChild(time);
                timeline.appendChild(item);
            });

            wrapper.appendChild(activitiesList);
            wrapper.appendChild(timeline);

            container.appendChild(wrapper);
        }
        function renderBudget() {
            const tableBody = document.getElementById('budgetTableBody');
            const chart = document.getElementById('budgetChart');

            tableBody.innerHTML = '';
            chart.innerHTML = '';

            const totalUSD = appState.budgetUSD;
            const isAED = appState.currency === 'AED';
            const rate = 3.67;

            const categories = [
                { key: 'hotels', label: 'الفنادق', percent: 30 },
                { key: 'flights', label: 'الطيران', percent: 25 },
                { key: 'activities', label: 'الأنشطة', percent: 25 },
                { key: 'food', label: 'الطعام', percent: 20 }
            ];

            categories.forEach(cat => {
                const amountUSD = totalUSD * (cat.percent / 100);
                const amount = isAED ? amountUSD * rate : amountUSD;
                const currencyLabel = isAED ? 'درهم' : 'دولار';

                const tr = document.createElement('tr');

                const tdCategory = document.createElement('td');
                tdCategory.textContent = cat.label;

                const tdPercent = document.createElement('td');
                tdPercent.textContent = `${cat.percent}%`;

                const tdAmount = document.createElement('td');
                tdAmount.textContent = `${amount.toFixed(0)} ${currencyLabel}`;

                const tdProgress = document.createElement('td');
                const progressBar = document.createElement('div');
                progressBar.className = 'progress-bar';
                const progressFill = document.createElement('div');
                progressFill.className = `progress-fill ${cat.key}`;
                progressFill.style.width = `${cat.percent}%`;
                progressBar.appendChild(progressFill);
                tdProgress.appendChild(progressBar);

                tr.appendChild(tdCategory);
                tr.appendChild(tdPercent);
                tr.appendChild(tdAmount);
                tr.appendChild(tdProgress);

                tableBody.appendChild(tr);

                const bar = document.createElement('div');
                bar.className = 'chart-bar';

                const label = document.createElement('div');
                label.textContent = cat.label;

                const visual = document.createElement('div');
                visual.className = 'chart-bar-visual';

                const fill = document.createElement('div');
                fill.className = `chart-bar-fill ${cat.key}`;
                fill.style.height = `${cat.percent}%`;

                visual.appendChild(fill);
                bar.appendChild(visual);

                const value = document.createElement('div');
                value.textContent = `${amount.toFixed(0)} ${currencyLabel}`;
                bar.appendChild(value);

                chart.appendChild(bar);
            });

            const currencyLabelEl = document.getElementById('currencyLabel');
            currencyLabelEl.textContent = appState.currency === 'USD' ? 'USD → AED' : 'AED → USD';
        }
        function renderBookings() {
            const grid = document.getElementById('bookingsGrid');
            grid.innerHTML = '';

            if (!appState.destinationKey) {
                grid.innerHTML = '<p style="font-size:0.9rem;color:var(--color-text-secondary);">اختر وجهة لتظهر لك الحجوزات المقترحة.</p>';
                return;
            }

            const dest = destinationsData[appState.destinationKey];

            const mockBookings = [
                {
                    type: 'hotel',
                    title: `فندق فاخر في ${dest.name}`,
                    rating: 4.7,
                    priceUSD: 220,
                    image: 'linear-gradient(135deg,#2563EB,#1D4ED8)'
                },
                {
                    type: 'restaurant',
                    title: `مطعم مطل على البحر في ${dest.name}`,
                    rating: 4.5,
                    priceUSD: 60,
                    image: 'linear-gradient(135deg,#F97316,#EA580C)'
                },
                {
                    type: 'activity',
                    title: `جولة خاصة في أبرز معالم ${dest.name}`,
                    rating: 4.8,
                    priceUSD: 150,
                    image: 'linear-gradient(135deg,#22C55E,#16A34A)'
                }
            ];

            mockBookings.forEach((booking) => {
                const card = document.createElement('div');
                card.className = 'booking-card';

                const image = document.createElement('div');
                image.className = 'booking-image';
                image.style.backgroundImage = booking.image;

                const content = document.createElement('div');
                content.className = 'booking-content';

                const title = document.createElement('div');
                title.className = 'booking-title';
                title.textContent = booking.title;

                const meta = document.createElement('div');
                meta.className = 'booking-meta';

                const stars = document.createElement('div');
                stars.className = 'stars';
                stars.innerHTML = '<i class="fa-solid fa-star"></i> ' + booking.rating.toFixed(1);

                const price = document.createElement('div');
                const currencyLabel = appState.currency === 'AED' ? 'درهم' : 'دولار';
                const rate = 3.67;
                const priceValue = appState.currency === 'AED' ? booking.priceUSD * rate : booking.priceUSD;
                price.textContent = `${priceValue.toFixed(0)} ${currencyLabel}`;

                meta.appendChild(stars);
                meta.appendChild(price);

                content.appendChild(title);
                content.appendChild(meta);

                const actions = document.createElement('div');
                actions.className = 'booking-actions';

                const typeLabel = document.createElement('div');
                typeLabel.style.fontSize = '0.8rem';
                typeLabel.style.color = 'var(--color-text-secondary)';
                typeLabel.textContent = booking.type === 'hotel' ? 'فندق' : booking.type === 'restaurant' ? 'مطعم' : 'نشاط';

                const btn = document.createElement('button');
                btn.className = 'btn-book';
                btn.innerHTML = '<i class="fa-solid fa-check"></i> احجز الآن';

                btn.addEventListener('click', () => {
                    card.classList.add('pulse');
                    setTimeout(() => {
                        card.classList.remove('pulse');
                        card.classList.add('booked');
                        showToast('تم الحجز بنجاح! 🎉', 'success');
                    }, 500);
                });

                actions.appendChild(typeLabel);
                actions.appendChild(btn);

                card.appendChild(image);
                card.appendChild(content);
                card.appendChild(actions);

                grid.appendChild(card);
            });
        }
        function showModal(activity) {
            const overlay = document.getElementById('modalOverlay');
            const titleEl = document.getElementById('modalTitle');
            const descEl = document.getElementById('modalDescription');
            const metaEl = document.getElementById('modalMeta');
            const imgEl = document.getElementById('modalImage');

            titleEl.textContent = activity.title;
            descEl.textContent = activity.description;

            const currencyLabel = appState.currency === 'AED' ? 'درهم' : 'دولار';
            const rate = 3.67;
            const cost = appState.currency === 'AED' ? activity.costUSD * rate : activity.costUSD;

            metaEl.innerHTML = `
                <div>الوقت: ${activity.timeLabel}</div>
                <div>المدة: ${activity.duration}</div>
                <div>التكلفة التقريبية: ${cost.toFixed(0)} ${currencyLabel}</div>
            `;

            imgEl.style.display = 'block';
            imgEl.src = 'https://via.placeholder.com/480x260/2563EB/FFFFFF?text=' + encodeURIComponent(activity.title);

            overlay.style.display = 'flex';
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.style.display = 'none';
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast toast-' + type;

            const icon = document.createElement('i');
            icon.className = type === 'success' ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-info';

            const text = document.createElement('div');
            text.textContent = message;

            toast.appendChild(icon);
            toast.appendChild(text);

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    container.removeChild(toast);
                }, 200);
            }, 3000);
        }
        // دالة toggleCurrency: تبديل العملة بين USD و AED
        function toggleCurrency() {
            appState.currency = appState.currency === 'USD' ? 'AED' : 'USD';
            renderBudget();
            renderBookings();
            showToast(`تم التبديل إلى ${appState.currency === 'USD' ? 'الدولار الأمريكي' : 'الدرهم الإماراتي'}.`, 'success');
        }
        // دالة exportToPDF: تصدير الخطة إلى PDF باستخدام html2pdf.js
        function exportToPDF() {
            const element = document.getElementById('app');
            const opt = {
                margin:       0.5,
                filename:     'trip-plan.pdf',
                image:        { type: 'jpeg', quality: 0.95 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().from(element).set(opt).save();
            showToast('جارٍ تحميل ملف PDF...', 'success');
        }
        // تهيئة التطبيق عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
    </body>
</html>
